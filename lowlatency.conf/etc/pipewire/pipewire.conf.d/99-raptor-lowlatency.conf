# Raptor OS: PipeWire low-latency gaming audio
# 256 samples at 48 kHz ≈ 5.3 ms round-trip latency.
# Raise quantum to 512/1024 if you get xruns on low-end hardware.
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 192000 ]
    default.clock.quantum       = 256
    default.clock.min-quantum   = 32
    default.clock.max-quantum   = 8192
    log.level                   = 2
}

context.modules = [
    { name  = libpipewire-module-rt
      args  = {
          nice.level   = -11
          rt.prio      = 88
          rt.time.soft = 200000
          rt.time.hard = 400000
      }
      flags = [ ifexists nofail ]
    }
]
