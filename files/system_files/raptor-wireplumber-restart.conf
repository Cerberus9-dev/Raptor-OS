# Raptor OS: WirePlumber crash recovery
# Same burst limiting as the PipeWire restart config.
# WirePlumber manages device/session policy — if it crashes on a specific
# device, burst limiting stops it from chewing CPU in a restart loop.
[Service]
Restart=on-failure
RestartSec=2
RestartLimitBurst=5
RestartLimitIntervalSec=60
