# Raptor OS: real-time audio scheduling limits for PipeWire/JACK
# /etc/security/limits.d/raptor-audio-rt.conf
#
# @audio group: PipeWire and its clients run in this group on Bazzite.
# rtprio 95: allows PipeWire to request RT priority up to 95 via rtkit.
#            Our PipeWire config requests priority 88, so 95 gives headroom.
# memlock unlimited: allows PipeWire to lock its audio buffers into RAM,
#                    preventing them from being paged out mid-frame (would
#                    cause an xrun / audio dropout).
# nice -19: maximum priority for CPU scheduling within the normal scheduler,
#           used when RT is not available.
#
# NOT setting rtprio for '*' (all users): giving every user on the system
# real-time scheduling capability is a security risk — any user process
# could starve the kernel. Only the @audio group gets elevated RT.
@audio  -  rtprio   95
@audio  -  memlock  unlimited
@audio  -  nice     -19
