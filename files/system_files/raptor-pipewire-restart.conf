# Raptor OS: PipeWire crash recovery
# Restart automatically after suspend/resume failures or plugin crashes.
# RestartLimitBurst=5 / RestartLimitIntervalSec=60:
#   allow up to 5 restarts per minute before giving up and logging an error.
#   Prevents infinite restart loop if a broken plugin or device causes
#   immediate re-crash on every start.
[Service]
Restart=on-failure
RestartSec=2
RestartLimitBurst=5
RestartLimitIntervalSec=60
