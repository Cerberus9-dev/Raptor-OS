# Raptor OS: Cloudflare DoT as system resolver (Quad9 fallback)
# Reduces DNS latency vs ISP resolvers; DNSSEC validates responses.
[Resolve]
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com
FallbackDNS=9.9.9.9#dns.quad9.net 8.8.8.8#dns.google
DNSOverTLS=opportunistic
DNSSEC=allow-downgrade
Cache=yes
DNSStubListener=yes
