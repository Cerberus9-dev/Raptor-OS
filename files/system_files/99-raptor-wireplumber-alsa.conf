# Raptor OS: WirePlumber ALSA device tuning
# Disables auto-suspend so devices never power-gate between sounds (no pop/click).
# Period size matches the PipeWire quantum above.
monitor.alsa.rules = [
  {
    matches = [{ node.name = "~alsa_output.*" }]
    actions = {
      update-props = {
        api.alsa.period-size            = 256
        api.alsa.headroom               = 8192
        api.alsa.period-num             = 2
        session.suspend-timeout-seconds = 0
        api.alsa.disable-suspend        = true
        resample.quality                = 6
      }
    }
  }
  {
    matches = [{ node.name = "~alsa_input.*" }]
    actions = {
      update-props = {
        api.alsa.period-size            = 256
        api.alsa.headroom               = 4096
        session.suspend-timeout-seconds = 0
        api.alsa.disable-suspend        = true
        resample.quality                = 6
      }
    }
  }
]
