# Raptor OS: WirePlumber ALSA device tuning
# Disables auto-suspend to prevent pop/click when audio wakes from power-gating.
# Headroom set to 0 for outputs (was 8192 — 170ms of extra buffer that caused
# timing conflicts with the quantum and produced static under gaming load).
monitor.alsa.rules = [
  {
    matches = [{ node.name = "~alsa_output.*" }]
    actions = {
      update-props = {
        api.alsa.period-size            = 512
        api.alsa.headroom               = 0
        api.alsa.period-num             = 2
        session.suspend-timeout-seconds = 0
        api.alsa.disable-suspend        = true
        resample.quality                = 6
      }
    }
  }
  {
    matches = [{ node.name = "~alsa_input.*" }]
    actions = {
      update-props = {
        api.alsa.period-size            = 256
        api.alsa.headroom               = 512
        session.suspend-timeout-seconds = 0
        api.alsa.disable-suspend        = true
        resample.quality                = 6
      }
    }
  }
]
