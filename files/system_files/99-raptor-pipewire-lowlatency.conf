# Raptor OS: PipeWire gaming audio — balanced latency/stability
# 512 samples at 48 kHz ≈ 10.7 ms — resilient under gaming CPU load.
# Lower to 256 if you need sub-6ms latency for a DAW or audio work;
# raise to 1024 if you still hear static during heavy GPU frames.
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 192000 ]
    default.clock.quantum       = 512
    default.clock.min-quantum   = 64
    default.clock.max-quantum   = 8192
    log.level                   = 2
}

context.modules = [
    { name  = libpipewire-module-rt
      args  = {
          nice.level   = -11
          rt.prio      = 88
          rt.time.soft = 200000
          rt.time.hard = 400000
      }
      flags = [ ifexists nofail ]
    }
]
