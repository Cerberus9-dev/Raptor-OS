# Raptor OS: ZRAM swap configuration for systemd-zram-generator
# This file is the single source of truth for ZRAM setup on this system.
# The manual raptor-zram.service has been removed to avoid race conditions.

[zram0]
# Use up to half of physical RAM, capped at 8 GB.
zram-size = min(ram / 2, 8192)

# zstd: best compression ratio for ZRAM; still faster than disk I/O.
# lz4 is faster but compresses ~30% less — swap space used sooner on low-RAM systems.
compression-algorithm = zstd

# Ensure ZRAM swap is used before any disk-based swap (hibernation partition, etc.)
swap-priority = 100
