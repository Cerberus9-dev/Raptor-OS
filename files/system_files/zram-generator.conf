# Raptor OS: ZRAM swap — single source of truth for swap configuration.
# raptor-zram-init.service has been removed to avoid race conditions with
# this generator (you cannot resize an active ZRAM device).
# systemd-zram-generator runs before swap is activated, so this is correct.

[zram0]
# Size: up to half of physical RAM, capped at 8 GB.
# On 8 GB systems → 4 GB ZRAM. On 32 GB systems → 8 GB ZRAM cap.
zram-size = min(ram / 2, 8192)

# zstd: best compression ratio (~2.5-3:1 for typical memory workloads).
# Faster to compress/decompress than lz4 on modern CPUs with hardware AES,
# and compresses ~30% better — means more effective swap space on low-RAM systems.
compression-algorithm = zstd

# ZRAM gets swap priority 100 — always preferred over disk-based swap.
# If a hibernation partition is present it gets priority ≤ 1 by default.
swap-priority = 100

# discard: tell the kernel it can discard ZRAM pages that have been
# moved back to RAM, freeing the compressed slot for reuse. Reduces
# ZRAM memory overhead over long sessions as apps free memory.
options = discard
