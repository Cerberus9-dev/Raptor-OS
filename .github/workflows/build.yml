name: build-raptor
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Push Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
  iso:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.3
        id: build
        with:
          image_name: raptor-os
          image_repo: ghcr.io/cerberus9-dev
          image_tag: latest
          version: 41
          variant: Kinoite
          iso_name: raptor-os.iso
      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptor-os-iso
          retention-days: 5
          path: ${{ steps.build.outputs.iso_path }}
      - name: Create Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ github.run_number }} --force
          git push origin v${{ github.run_number }} --force
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Raptor OS v${{ github.run_number }}
          body: |
            Latest build of Raptor OS.
            - Image: `ghcr.io/cerberus9-dev/raptor-os:latest`
            - ISO: [Download](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/raptor-os.iso)
          make_latest: true
          files: ${{ steps.build.outputs.iso_path }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
