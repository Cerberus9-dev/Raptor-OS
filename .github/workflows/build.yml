name: Build Raptor OS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Rebuild weekly on Sunday at 04:00 UTC to pick up upstream Bazzite updates
    - cron: "0 4 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Push Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}

  iso:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: build
    # Only build ISOs on pushes to main, not on PRs
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc
          df -h

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.3
        id: build
        with:
          image_name: raptor-os
          image_repo: ghcr.io/cerberus9-dev
          image_tag: latest
          version: 41
          variant: Kinoite
          iso_name: raptor-os.iso
          # Sign the ISO with the same key used for the image
          # secure_boot_key_url: ${{ secrets.SECURE_BOOT_KEY_URL }}

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptor-os-iso
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ steps.build.outputs.iso_path }}
            ${{ steps.build.outputs.iso_path }}.sha256
