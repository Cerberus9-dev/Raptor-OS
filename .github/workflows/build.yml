name: Build Raptor OS

on:
  push:
    branches:
      - main
    paths:
      # Only rebuild the image when something that actually affects the build changes.
      # README, changelog, and docs edits no longer trigger a 15-minute build.
      - "recipes/**"
      - "files/**"
      - ".github/workflows/build.yml"

  pull_request:
    branches:
      - main
    paths:
      - "recipes/**"
      - "files/**"

  schedule:
    # Rebuild weekly on Sunday 04:00 UTC to pick up upstream Bazzite updates.
    # Change to "0 4 1,15 * *" (1st + 15th) if weekly feels too frequent.
    - cron: "0 4 * * 0"

  # Manual trigger — useful for forcing a rebuild without a code change,
  # e.g. after upstream Bazzite publishes a hotfix mid-week.
  workflow_dispatch:

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents stacked builds queueing up during rapid iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      # ── Free disk space ─────────────────────────────────────────────────────
      # The default ubuntu-latest runner has ~14 GB free. Container builds for
      # Bazzite-based images need ~10 GB. Remove unused toolchains first.
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout
        uses: actions/checkout@v7

      # ── Prepare file context ─────────────────────────────────────────────────
      # BlueBuild mounts this directory into the build container.
      - name: Prepare files
        run: |
          mkdir -p /tmp/files
          cp -r files/system_files /tmp/files/

      # ── Build and push ───────────────────────────────────────────────────────
      - name: Build and push image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
