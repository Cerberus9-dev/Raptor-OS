name: Build Raptor OS ISO

# ISO builds are MANUAL ONLY.
# Existing users update via Raptor Update Manager — new ISOs are only
# needed for fresh install image releases.
#
# How to trigger:
#   GitHub → Actions → "Build Raptor OS ISO" → Run workflow

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Image tag to build ISO from"
        required: false
        default: "latest"

concurrency:
  group: iso-build
  cancel-in-progress: false

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af 2>/dev/null || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: raptor-os
          image_repo: ghcr.io/cerberus9-dev
          image_tag: ${{ github.event.inputs.version_tag }}
          version: 42
          variant: Kinoite
          iso_name: raptor-os-${{ github.event.inputs.version_tag }}.iso

      - name: Verify ISO
        run: |
          # iso_path is the DIRECTORY the ISO was placed in, not the file
          # itself — the previous version treated it as the full path, which
          # evaluated to "." and failed every run. Combine with iso_name for
          # the actual file, matching the action's own documented usage.
          ISO_DIR="${{ steps.build.outputs.iso_path }}"
          ISO_NAME="${{ steps.build.outputs.iso_name }}"
          ISO_FILE="${ISO_DIR}/${ISO_NAME}"

          if [ ! -f "$ISO_FILE" ]; then
            echo "ERROR: ISO not found at $ISO_FILE"
            echo "Directory contents of $ISO_DIR:"
            ls -la "$ISO_DIR" 2>&1 || echo "(directory does not exist)"
            exit 1
          fi

          echo "ISO: $ISO_FILE ($(du -sh "$ISO_FILE" | cut -f1))"
          sha256sum "$ISO_FILE" | tee "${ISO_FILE}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptor-os-${{ github.event.inputs.version_tag }}-${{ github.run_number }}
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}.sha256
