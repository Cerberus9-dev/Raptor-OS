name: Build Raptor OS ISO

# ISO builds are MANUAL ONLY.
# Existing users update via Raptor Update Manager — new ISOs are only
# needed for fresh install image releases.
#
# How to trigger:
#   GitHub → Actions → "Build Raptor OS ISO" → Run workflow

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Image tag to build ISO from"
        required: false
        default: "latest"

concurrency:
  group: iso-build
  cancel-in-progress: false

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af 2>/dev/null || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: raptor-os
          image_repo: ghcr.io/cerberus9-dev
          image_tag: ${{ github.event.inputs.version_tag }}
          version: 42
          variant: Kinoite
          iso_name: raptor-os-${{ github.event.inputs.version_tag }}.iso

      - name: Verify ISO
        run: |
          ISO_PATH="${{ steps.build.outputs.iso_path }}"
          if [ ! -f "$ISO_PATH" ]; then
            echo "ERROR: ISO not found at $ISO_PATH"
            exit 1
          fi
          echo "ISO: $ISO_PATH ($(du -sh "$ISO_PATH" | cut -f1))"
          sha256sum "$ISO_PATH" | tee "${ISO_PATH}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptor-os-${{ github.event.inputs.version_tag }}-${{ github.run_number }}
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ steps.build.outputs.iso_path }}
            ${{ steps.build.outputs.iso_path }}.sha256
