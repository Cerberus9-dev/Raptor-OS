name: raptor-os
description: Tactical OS.
base-image: ghcr.io/ublue-os/bazzite
image-flavor: main
fedora-version: 40

modules:
  - type: rpm-ostree
    install:
      # These are 100% guaranteed to be in the Fedora servers
      - btop
      - fastfetch
      - plasma-systemmonitor
      - nvtop
      - firewalld
      - jetbrains-mono-fonts

  - type: script
    scripts:
      - raptor-hud.sh

  - type: flatpak
    install:
      # Brave and Opera are much safer as Flatpaks in this build system
      - com.brave.Browser
      - com.opera.Opera
      - com.github.FreeTubeApp.FreeTube
      - dev.vencord.Vesktop
      - org.qbittorrent.qBittorrent
      - org.qbittorrent.qBittorrent
