# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: raptor-os
description: Raptor OS — a Bazzite-based custom image for gaming, development, and creative workflows.
base-image: ghcr.io/ublue-os/bazzite
image-version: stable

modules:
  # ── Static files ─────────────────────────────────────────────────────────────
  - type: files
    files:
      # User service — must live in the user unit dir so it runs inside the
      # login session (needed for GUI dialogs and correct env on Wayland).
      - source: ../files/system_files/raptor-firstboot.service
        destination: /usr/lib/systemd/user/raptor-firstboot.service
      - source: ../files/system_files/raptor-ensure-services.service
        destination: /usr/lib/systemd/system/raptor-ensure-services.service
      - source: ../files/system_files/raptor-cpugovernor.service
        destination: /usr/lib/systemd/system/raptor-cpugovernor.service
      - source: ../files/system_files/raptor-powerprofile.service
        destination: /usr/lib/systemd/system/raptor-powerprofile.service
      - source: ../files/system_files/raptor-app-choice.sh
        destination: /usr/bin/raptor-app-choice.sh
      - source: ../files/system_files/raptor-browser-choice.sh
        destination: /usr/bin/raptor-browser-choice.sh
      # ── Audio: PipeWire low-latency gaming config ──────────────────────────
      - source: ../files/system_files/99-raptor-pipewire-lowlatency.conf
        destination: /etc/pipewire/pipewire.conf.d/99-raptor-lowlatency.conf
      - source: ../files/system_files/99-raptor-wireplumber-alsa.conf
        destination: /etc/wireplumber/wireplumber.conf.d/99-raptor-alsa.conf
      - source: ../files/system_files/raptor-audio-rt.conf
        destination: /etc/security/limits.d/raptor-audio-rt.conf
      - source: ../files/system_files/raptor-pipewire-restart.conf
        destination: /etc/systemd/user/pipewire.service.d/raptor-restart.conf
      - source: ../files/system_files/raptor-wireplumber-restart.conf
        destination: /etc/systemd/user/wireplumber.service.d/raptor-restart.conf
      - source: ../files/system_files/zram-generator.conf
        destination: /etc/systemd/zram-generator.conf

  # ── RPM packages ─────────────────────────────────────────────────────────────
  - type: rpm-ostree
    install:
      # Browser
      - firefox

      # System utilities
      - fastfetch
      - htop
      - btop
      - bleachbit
      - filelight
      - p7zip
      - curl
      - wget
      - jq
      - zenity

      # KDE extras
      - plasma-systemmonitor
      - gwenview
      - kamoso
      - kcalc
      - variety

      # Power management
      - power-profiles-daemon

      # Multimedia
      - vlc
      - mpv
      - obs-studio
      - audacity
      - kdenlive

      # Creative
      - gimp
      - inkscape
      - krita
      - darktable

      # Office
      - libreoffice

      # Gaming
      - gamemode
      - mangohud
      - goverlay
      - wine
      - winetricks
      - protontricks

      # Development — runtimes
      - git
      - gh
      - nodejs
      - python3
      - python3-pip
      - python3-gobject

      # Development — build tools
      - gcc
      - make
      - cmake
      - ninja-build
      - meson

      # Development — terminal tools
      - neovim
      - tmux
      - ripgrep
      - fzf

      # GTK / theming
      - libadwaita

      # Containers
      - podman
      - podman-compose

      # Networking / downloads
      - qbittorrent
      - thunderbird

      # Disk management
      - partitionmanager

      # Theming — Raptor HUD
      - kvantum
      - kvantum-qt5
      - papirus-icon-theme
      - jetbrains-mono-fonts
      - qt5-qtbase

    remove:
      - tuned-ppd

  # ── Flatpaks ──────────────────────────────────────────────────────────────────
  # Only mandatory/core apps here. Optional apps (VSCodium, Blender, Bitwarden,
  # Joplin, etc.) are offered by raptor-firstboot.service on first login so the
  # user can choose what they actually want.
  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        # Core gaming stack — always present
        - dev.vencord.Vesktop            # Discord replacement (mandatory)
        - com.heroicgameslauncher.hgl    # Epic/GOG/Amazon game launcher
        - net.davidotek.pupgui2          # ProtonUp-Qt
        - com.usebottles.bottles         # Wine/DXVK app manager
        # System utilities — always present
        - io.missioncenter.MissionCenter # GPU/CPU/RAM monitor
        - com.github.tchx84.Flatseal    # Flatpak permission manager

  # ── Kernel boot arguments ─────────────────────────────────────────────────────
  # split_lock_detect=off   — prevents costly split-lock penalties in game loops
  # transparent_hugepage    — madvise lets games request hugepages without forcing
  #                           them globally (avoids fragmentation on mixed workloads)
  # nowatchdog + nmi=0      — removes periodic watchdog NMIs during gaming sessions
  - type: kargs
    kargs:
      - split_lock_detect=off
      - transparent_hugepage=madvise
      - nowatchdog
      - nmi_watchdog=0

  # ── Custom build scripts ──────────────────────────────────────────────────────
  - type: script
    scripts:
      - raptor-hud.sh
      - raptor-cortex.sh
      - raptor-gpu-profile.sh
      - raptor-gaming.sh
      - raptor-update.sh

  # ── Systemd units ─────────────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - raptor-ensure-services.service
        - raptor-gpu-profile.service
        # raptor-powerprofile.service: sets balanced as the boot default power
        # profile via powerprofilesctl; Cortex overrides at runtime per mode.
        - raptor-powerprofile.service
        # raptor-cpugovernor.service intentionally omitted: it called
        # /usr/bin/raptor-cpugovernor.sh which does not exist. CPU governor
        # is already handled inside gpu-detect.sh (raptor-gpu-profile.service).
    user:
      enabled:
        - raptor-firstboot.service
        # gamemoded: gamemode daemon must run in the user session to receive
        # dbus activation requests from games launched via Steam/Heroic/Lutris.
        - gamemoded.service
