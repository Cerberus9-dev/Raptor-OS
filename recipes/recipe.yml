# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: raptor-os
description: Raptor OS — a Bazzite-based custom image for gaming, development, and creative workflows.
base-image: ghcr.io/ublue-os/bazzite
image-version: stable

modules:
  # ── Static files ─────────────────────────────────────────────────────────────
  - type: files
    files:
      - source: ../files/system_files/raptor-firstboot.service
        destination: /usr/lib/systemd/system/raptor-firstboot.service
      - source: ../files/system_files/raptor-ensure-services.service
        destination: /usr/lib/systemd/system/raptor-ensure-services.service
      - source: ../files/system_files/raptor-cpugovernor.service
        destination: /usr/lib/systemd/system/raptor-cpugovernor.service
      - source: ../files/system_files/raptor-powerprofile.service
        destination: /usr/lib/systemd/system/raptor-powerprofile.service
      - source: ../files/system_files/raptor-browser-choice.sh
        destination: /usr/bin/raptor-browser-choice.sh
      - source: ../files/system_files/zram-generator.conf
        destination: /etc/systemd/zram-generator.conf

  # ── RPM packages ─────────────────────────────────────────────────────────────
  - type: rpm-ostree
    install:
      # Browser
      - firefox

      # System utilities
      - fastfetch
      - htop
      - btop
      - bleachbit
      - filelight
      - p7zip
      - curl
      - wget
      - jq
      - zenity

      # KDE extras
      - plasma-systemmonitor
      - gwenview
      - kamoso
      - kcalc
      - variety

      # Power management
      - power-profiles-daemon

      # Multimedia
      - vlc
      - mpv
      - obs-studio
      - audacity
      - kdenlive

      # Creative
      - gimp
      - inkscape
      - krita
      - darktable

      # Office
      - libreoffice

      # Gaming
      - gamemode
      - goverlay
      - wine
      - winetricks

      # Development — runtimes
      - git
      - gh
      - nodejs
      - python3
      - python3-pip
      - python3-gobject

      # Development — build tools
      - gcc
      - make
      - cmake
      - ninja-build
      - meson

      # Development — terminal tools
      - neovim
      - tmux
      - ripgrep
      - fzf

      # GTK / theming
      - libadwaita

      # Containers
      - podman
      - podman-compose

      # Networking / downloads
      - qbittorrent
      - thunderbird

      # Theming — Raptor HUD
      - kvantum
      - kvantum-qt5
      - papirus-icon-theme
      - jetbrains-mono-fonts
      - qt5-qtbase

    remove:
      - tuned-ppd

  # ── Flatpaks ──────────────────────────────────────────────────────────────────
  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - com.vesktop.Vesktop
        - com.heroicgameslauncher.hgl
        - net.davidotek.pupgui2
        - com.usebottles.bottles
        - com.vscodium.codium
        - com.github.marhkb.Pods
        - org.blender.Blender
        - org.shotcut.Shotcut
        - com.calibre_ebook.calibre
        - net.cozic.joplin_desktop
        - com.github.marktext.marktext
        - io.missioncenter.MissionCenter
        - com.github.tchx84.Flatseal
        - com.bitwarden.desktop
        - com.feaneron.Boatswain

  # ── Custom build scripts ──────────────────────────────────────────────────────
  # raptor-hud.sh also copies the plasmoid from /tmp/files
  - type: script
    scripts:
      - raptor-hud.sh
      - raptor-cortex.sh
      - raptor-gpu-profile.sh
      - raptor-gaming.sh
      - raptor-update.sh

  # ── Systemd units ─────────────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - raptor-firstboot.service
        - raptor-ensure-services.service
        - raptor-gpu-profile.service
        - raptor-cpugovernor.service
