# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: raptor-os
description: Victory Build with browser choice on first boot.
base-image: ghcr.io/ublue-os/bazzite
image-version: latest

modules:
  # Copy custom files (firstboot service and browser choice script)
  - type: files
    files:
      - source: system_files/raptor-firstboot.service
        destination: /usr/lib/systemd/system/raptor-firstboot.service
      - source: system_files/raptor-browser-choice.sh
        destination: /usr/local/bin/raptor-browser-choice.sh

  # Make the browser choice script executable
  - type: script
    scripts:
      - chmod +x /usr/local/bin/raptor-browser-choice.sh

  # Install RPM packages
  - type: rpm-ostree
    install:
      - firefox
      - fastfetch
      - plasma-systemmonitor
      - libreoffice
      - kdenlive
      - gimp
      - inkscape
      - krita
      - vlc
      - obs-studio
      - p7zip
      - gwenview
      - filelight
      - gamemode
      - goverlay
      - zenity
      - git
      - gh
      - nodejs
      - python3
      - python3-pip
      - gcc
      - make
      - cmake
      - ninja-build
      - meson
      - neovim
      - htop
      - podman
      - podman-compose
      - curl
      - wget
      - jq
      - ripgrep
      - fzf
      - tmux
      - variety
      - wine
      - winetricks
      - kcalc
      - kamoso
      - bleachbit
      - darktable
      - audacity

  # Install default flatpaks
  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - com.discordapp.Discord
        - com.heroicgameslauncher.hgl
        - com.vscodium.codium
        - com.github.marhkb.Pods
        - com.calibre_ebook.calibre
        - net.cozic.joplin_desktop
        - com.github.marktext.marktext
        - io.missioncenter.MissionCenter
        - net.davidotek.pupgui2
        - org.blender.Blender
        - com.github.tchx84.Flatseal
        - com.usebottles.bottles
        - com.feaneron.Boatswain

  # Enable firstboot service
  - type: systemd
    system:
      enabled:
        - raptor-firstboot.service
