---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: raptor-os
description: Victory Build.
base-image: ghcr.io/ublue-os/bazzite
image-version: latest
modules:
  - type: files
    files:
      - source: system_files/raptor-firstboot.service
        destination: /usr/lib/systemd/system/raptor-firstboot.service

  - type: rpm-ostree
    install:
      - firefox
      - fastfetch
      - plasma-systemmonitor
      - libreoffice
      - thunderbird
      - kdenlive
      - gimp
      - gamemode
      - goverlay
      - zenity
      - git
      - gh
      - nodejs
      - python3
      - python3-pip
      - gcc
      - make

  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - com.discordapp.Discord
        - com.heroicgameslauncher.hgl
        - com.vscodium.codium
        - org.gnome.Bottles

  - type: systemd
    system:
      enabled:
        - raptor-firstboot.service

  - type: script
    scripts:
      - raptor-hud.sh
