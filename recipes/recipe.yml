name: raptor-os
description: Private Tactical OS - Home Edition.
base-image: ghcr.io/ublue-os/bazzite
image-flavor: main
fedora-version: 40

modules:
  - type: rpm-ostree
    install:
      - brave-browser
      - opera-stable
      - btop
      - fastfetch
      - plasma-systemmonitor
      - nvtop
      - p7zip
      - unrar
      - firewalld
      - jetbrains-mono-fonts

  - type: script
    scripts:
      - raptor-hud.sh

  - type: flatpak
    install:
      - com.github.FreeTubeApp.FreeTube
      - dev.vencord.Vesktop
      - com.usebottles.bottles
      - org.qbittorrent.qBittorrent
