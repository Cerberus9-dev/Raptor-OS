name: raptor-os
description: Private Tactical OS - Home Edition.
base-image: ghcr.io/ublue-os/bazzite
image-flavor: main
fedora-version: 40

modules:
  - type: rpm-ostree
    repos:
      - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      - https://rpm.opera.com/rpm/opera.repo
    install:
      # Browsers
      - brave-browser
      - opera-stable
      # Tactical Telemetry
      - btop
      - fastfetch
      - plasma-systemmonitor
      - nvtop
      # Productivity & Tools
      - p7zip
      - unrar
      - firewalld
      - jetbrains-mono-fonts

  - type: flatpak
    install:
      - com.github.FreeTubeApp.FreeTube
      - dev.vencord.Vesktop
      - com.usebottles.bottles
      - org.qbittorrent.qBittorrent

  - type: script
    scripts:
      - raptor-hud.sh
