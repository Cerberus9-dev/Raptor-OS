---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: raptor-os
description: Victory Build.
base-image: ghcr.io/ublue-os/bazzite
image-version: latest
modules:
  - type: files
    files:
      - source: system_files/raptor-firstboot.service
        destination: /usr/lib/systemd/system/raptor-firstboot.service
      - source: system/usr/local/bin
        destination: /usr/local/bin/raptor-browser-choice.sh

  - type: rpm-ostree
    install:
      - firefox
      - fastfetch
      - plasma-systemmonitor
      - libreoffice
      - thunderbird
      - kdenlive
      - gimp
      - inkscape
      - krita
      - vlc
      - obs-studio
      - p7zip
      - gwenview
      - filelight
      - gamemode
      - goverlay
      - zenity
      - git
      - gh
      - nodejs
      - python3
      - python3-pip
      - gcc
      - make
      - cmake
      - ninja-build
      - meson
      - neovim
      - htop
      - podman
      - podman-compose
      - curl
      - wget
      - jq
      - ripgrep
      - fzf
      - tmux
      - variety
      - wine
      - winetricks

  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - com.discordapp.Discord
        - com.heroicgameslauncher.hgl
        - com.vscodium.codium

  - type: systemd
    system:
      enabled:
        - raptor-firstboot.service

  - type: script
    scripts:
      - raptor-hud.sh
      - raptor-performance.sh
      - raptor-gaming.sh
